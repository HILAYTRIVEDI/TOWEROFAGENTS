services:
  api:
    command:
      [
        "uvicorn",
        "main:app",
        "--reload",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
      ]
    volumes:
      - ./apps/api:/app

  band-agent:
    volumes:
      - ./apps/api:/app

  web:
    command: ["npm", "run", "dev", "--", "--hostname", "0.0.0.0"]
    environment:
      NODE_ENV: development
      HOSTNAME: 0.0.0.0
      PORT: 3000
      API_BASE_URL: http://api:8000
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
      NEXT_PUBLIC_DEFAULT_ORG_ID: ${NEXT_PUBLIC_DEFAULT_ORG_ID:-}
      WATCHPACK_POLLING: "true"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
