x-api-env: &api-env
  APP_ENV: ${APP_ENV:-development}
  API_CORS_ORIGINS: ${API_CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  SUPABASE_URL: ${SUPABASE_URL:-}
  SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
  SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
  AIML_API_KEY: ${AIML_API_KEY:-}
  AIML_DEFAULT_MODEL: ${AIML_DEFAULT_MODEL:-}
  FEATHERLESS_API_KEY: ${FEATHERLESS_API_KEY:-}
  FEATHERLESS_DEFAULT_MODEL: ${FEATHERLESS_DEFAULT_MODEL:-}
  FEATHERLESS_BASE_URL: ${FEATHERLESS_BASE_URL:-https://api.featherless.ai/v1}
  FEATHERLESS_TOOL_MODEL: ${FEATHERLESS_TOOL_MODEL:-}
  LLM_PROVIDER: ${LLM_PROVIDER:-mock}
  EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-mock}
  EMBEDDING_MODEL: ${EMBEDDING_MODEL:-}
  EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-1536}
  BAND_MODE: ${BAND_MODE:-mock}
  BAND_API_KEY: ${BAND_API_KEY:-}
  BAND_AGENT_ID: ${BAND_AGENT_ID:-}
  BAND_DEFAULT_ROOM_ID: ${BAND_DEFAULT_ROOM_ID:-}
  THENVOI_WS_URL: ${THENVOI_WS_URL:-}
  THENVOI_REST_URL: ${THENVOI_REST_URL:-}

services:
  api:
    build:
      context: ./apps/api
    image: tower-api
    environment:
      <<: *api-env
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  band-agent:
    build:
      context: ./apps/api
    image: tower-api
    command: ["python", "-m", "band.coordinator"]
    environment:
      <<: *api-env
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    environment:
      HOSTNAME: 0.0.0.0
      PORT: 3000
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"
    restart: unless-stopped

